services:
  api:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.prod
    container_name: braves_board_backend_staging
    ports:
      - "8000:8000"
    env_file:
      - ../../src/backend/app/config/env/staging.env
    depends_on:
      - db
      - redis
    restart: always

  migrator:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.prod
    container_name: braves_board_migrator_staging
    command: ["sh", "/app/deploy/docker/entrypoints/migrator.sh"]
    env_file:
      - ../../src/backend/app/config/env/staging.env
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: braves_board_db_staging
    env_file:
      - ../../src/backend/app/config/env/staging.env
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    container_name: braves_board_redis_staging
    volumes:
      - redis_data_staging:/data
    restart: always

volumes:
  postgres_data_staging:
  redis_data_staging: